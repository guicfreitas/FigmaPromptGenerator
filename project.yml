name: FigmaPromptGenerator
options:
  bundleIdPrefix: com.guilherme
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: 6.0
    PRODUCT_BUNDLE_IDENTIFIER: com.guilherme.FigmaPromptGenerator
targets:
  FigmaPromptGenerator:
    type: application
    platform: macOS
    sources:
      - path: FigmaPromptGenerator
        excludes:
          - Resources/instruction.md
    resources:
      - path: FigmaPromptGenerator/Resources
    settings:
      base:
        INFOPLIST_FILE: FigmaPromptGenerator/Info.plist
        CODE_SIGN_ENTITLEMENTS: FigmaPromptGenerator/FigmaPromptGenerator.entitlements
        PRODUCT_NAME: Figma Prompt Generator
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
